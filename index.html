<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>自動レートスコアボード</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; color: #333; background-color: #f0f2f5; }
    button { font-size: 18px; margin: 5px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
    button:active { background-color: #ddd; }
    .score, .chart-container, .history, .stats { max-width: 420px; margin: auto; text-align: left; background: #ffffff; padding: 15px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    canvas { width: 100%; height: auto; margin-top: 10px; }
    .auto-panel { background: #e3f2fd; padding: 12px; border-radius: 10px; max-width: 420px; margin: 10px auto; text-align: center; font-weight: bold; border: 1px solid #90caf9; }
    .macro-btn { background: #e0f7fa; border: 1px dashed #00bcd4; font-size: 16px; padding: 10px 20px; margin: 5px; border-radius: 6px; font-weight: bold; }
    h1, h2 { margin-bottom: 10px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    p { margin: 8px 0; font-size: 16px; }
    span { font-weight: bold; color: #007bff; }
    .sub-detail { font-size: 13px; color: #666; margin-left: 10px; font-weight: normal; }
  </style>
</head>
<body>

  <h1>ぷよテト2 スコアボード</h1>
  
  <!-- MacroDroid連動パネル（マクロはここの【自動レート取得】をタップするだけです） -->
  <div class="auto-panel">
    自動連動トリガー
    <div style="margin-top: 5px;">
      <button id="macroBtn" class="macro-btn" onclick="triggerMacroInput()">【自動レート取得】</button>
    </div>
  </div>

  <!-- 基本スコアエリア -->
  <div class="score">
    <h2>基本スコア</h2>
    <p>勝ち: <span id="wins">0</span></p>
    <p>試合数: <span id="games">0</span></p>
    <p>勝率: <span id="winrate">0%</span></p>
    <div style="text-align: center; margin-top: 10px;">
      <button onclick="addWinManual()" style="background-color: #e8f5e9;">手動 勝ち+1</button>
      <button onclick="addLossManual()" style="background-color: #ffebee;">手動 負け+1</button>
      <button onclick="undo()">↩️ 戻す</button>
      <button onclick="tryReset()" style="background-color: #eceff1;">リセット</button>
    </div>
  </div>

  <!-- レートに関する詳細統計エリア -->
  <div class="stats">
    <h2>レート統計</h2>
    <p>現在のレート: <span id="currentRateView">-</span></p>
    <p>最高レート: <span id="maxRateText">-</span></p>
    <p>最低レート: <span id="minRateText">-</span></p>
    <p>平均レート: <span id="avgRateText">-</span></p>
  </div>

  <!-- 勝率に関する統計エリア -->
  <div class="stats">
    <h2>勝率統計 (30試合ごと)</h2>
    <p>最大勝率: <span id="maxRate">-</span><span id="maxRateDetail" class="sub-detail">-</span></p>
    <p>最小勝率: <span id="minRate">-</span><span id="minRateDetail" class="sub-detail">-</span></p>
    <p>中央値: <span id="medianRate">-</span></p>
  </div>

  <!-- 2つのグラフエリア -->
  <div class="chart-container">
    <h2>レート推移グラフ</h2>
    <canvas id="rateHistoryChart"></canvas>
  </div>

  <div class="chart-container">
    <h2>勝率推移グラフ (30試合ごと)</h2>
    <canvas id="winrateChart"></canvas>
  </div>

  <!-- 履歴エリア -->
  <div class="history">
    <h2>30試合ごとの履歴</h2>
    <ul id="historyList" style="padding-left: 20px; margin: 5px 0;"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let wins = 0, games = 0, history = [], pastRates = [], rateDetails = [], undoStack = [];
    let chartWinrate, chartRateHistory;
    let resetPressCount = 0;
    let resetTimeout;
    
    let lastSavedRate = null;
    let rateHistoryLog = []; 

    function loadFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem("scoreData"));
        if (saved) {
          wins = saved.wins || 0;
          games = saved.games || 0;
          history = saved.history || [];
          pastRates = saved.pastRates || [];
          rateDetails = saved.rateDetails || [];
          rateHistoryLog = saved.rateHistoryLog || [];
        }
      } catch(e) {}
      lastSavedRate = localStorage.getItem("lastSavedRate") ? parseInt(localStorage.getItem("lastSavedRate")) : null;
    }

    function saveToStorage() {
      localStorage.setItem("scoreData", JSON.stringify({ wins, games, history, pastRates, rateDetails, rateHistoryLog }));
    }

    function updateDisplay() {
      document.getElementById("wins").textContent = wins;
      document.getElementById("games").textContent = games;
      const rate = games > 0 ? ((wins / games) * 100).toFixed(1) : 0;
      document.getElementById("winrate").textContent = rate + "%";

      const historyList = document.getElementById("historyList");
      historyList.innerHTML = "";
      for (let i = history.length - 1; i >= 0; i--) {
        const li = document.createElement("li");
        li.textContent = history[i];
        historyList.appendChild(li);
      }

      if (lastSavedRate === null) {
        document.getElementById("currentRateView").textContent = "未設定 (1戦目の数字待ち)";
      } else {
        document.getElementById("currentRateView").textContent = lastSavedRate + " 点";
      }

      updateCharts();
      updateStats();
    }

    function updateCharts() {
      if (typeof Chart === 'undefined') return;

      // 1. 勝率グラフ
      const ctxWin = document.getElementById("winrateChart").getContext("2d");
      if (chartWinrate) chartWinrate.destroy();
      chartWinrate = new Chart(ctxWin, {
        type: 'line',
        data: {
          labels: pastRates.map((_, i) => `${(i + 1) * 30}割`),
          datasets: [{
            label: '勝率 (%)',
            data: pastRates,
            borderColor: '#2196f3',
            backgroundColor: 'rgba(33, 150, 243, 0.1)',
            tension: 0.2,
            fill: true
          }]
        },
        options: { responsive: true, scales: { y: { suggestedMin: 0, suggestedMax: 100, ticks: { callback: value => value + '%' } } } }
      });

      // 2. レート推移グラフ
      const ctxRate = document.getElementById("rateHistoryChart").getContext("2d");
      if (chartRateHistory) chartRateHistory.destroy();
      chartRateHistory = new Chart(ctxRate, {
        type: 'line',
        data: {
          labels: rateHistoryLog.map((_, i) => `${i}戦目`),
          datasets: [{
            label: '本物のレート',
            data: rateHistoryLog,
            borderColor: '#4caf50',
            backgroundColor: 'rgba(76, 175, 80, 0.1)',
            tension: 0.1,
            fill: true
          }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
      });
    }

    function updateStats() {
      // 勝率統計
      const maxRateEl = document.getElementById("maxRate");
      const minRateEl = document.getElementById("minRate");
      const medianRateEl = document.getElementById("medianRate");
      const maxRateDetailEl = document.getElementById("maxRateDetail");
      const minRateDetailEl = document.getElementById("minRateDetail");

      if (pastRates.length === 0) {
        maxRateEl.textContent = minRateEl.textContent = medianRateEl.textContent = "-";
        maxRateDetailEl.textContent = minRateDetailEl.textContent = "-";
      } else {
        const max = Math.max(...pastRates);
        const min = Math.min(...pastRates);
        const sorted = [...pastRates].sort((a, b) => a - b);
        const median = (sorted.length % 2 === 0)
          ? ((sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2).toFixed(1)
          : sorted[Math.floor(sorted.length / 2)].toFixed(1);

        maxRateEl.textContent = max.toFixed(1) + "%";
        minRateEl.textContent = min.toFixed(1) + "%";
        medianRateEl.textContent = median + "%";

        const maxDetail = rateDetails.find(d => d.rate === max);
        const minDetail = rateDetails.find(d => d.rate === min);
        maxRateDetailEl.textContent = maxDetail ? ` (試合数: ${maxDetail.games}, ${maxDetail.time})` : "-";
        minRateDetailEl.textContent = minDetail ? ` (試合数: ${minDetail.games}, ${minDetail.time})` : "-";
      }

      // レート統計
      const maxRateText = document.getElementById("maxRateText");
      const minRateText = document.getElementById("minRateText");
      const avgRateText = document.getElementById("avgRateText");

      if (rateHistoryLog.length === 0) {
        maxRateText.textContent = minRateText.textContent = avgRateText.textContent = "-";
      } else {
        const maxRateVal = Math.max(...rateHistoryLog);
        const minRateVal = Math.min(...rateHistoryLog);
        const sumRateVal = rateHistoryLog.reduce((a, b) => a + b, 0);
        const avgRateVal = (sumRateVal / rateHistoryLog.length).toFixed(0);

        maxRateText.textContent = maxRateVal + " 点";
        minRateText.textContent = minRateVal + " 点";
        avgRateText.textContent = avgRateVal + " 点";
      }
    }

    function checkAndRecordIfNeeded() {
      if (games % 30 === 0 && games !== 0) {
        const now = new Date();
        const timestamp = now.toLocaleString();
        const currentRate = ((wins / games) * 100).toFixed(1);
        pastRates.push(parseFloat(currentRate));
        rateDetails.push({ rate: parseFloat(currentRate), games: games, time: timestamp });

        const total = pastRates.reduce((a, b) => a + b, 0);
        const avgRate = (total / pastRates.length).toFixed(1);
        const record = `試合数 ${games}：${timestamp} 勝率 ${currentRate}%（平均勝率：${avgRate}%）`;
        history.push(record);
        saveToStorage();
      }
    }

    function saveStateForUndo() {
      undoStack.push({
        wins, games,
        history: [...history],
        pastRates: [...pastRates],
        rateDetails: [...rateDetails],
        rateHistoryLog: [...rateHistoryLog],
        lastSavedRate: lastSavedRate
      });
    }

    // カメラ（マクロ）から届いた「本物の数値」を使って自動で引き算・勝敗判定を行う
    window.processCapturedRate = function(newRate) {
      saveStateForUndo();
      
      if (lastSavedRate !== null) {
        if (newRate > lastSavedRate) {
          wins++; // レートが増えていたら勝ち
        }
        // レートが減っていたら自動で負け（増減なしはカウントしない）
        if (newRate !== lastSavedRate) {
          games++;
          lastSavedRate = newRate;
          rateHistoryLog.push(lastSavedRate);
        } else {
          alert(`レートに変動がありません（現在の値: ${newRate}）`);
          return;
        }
      } else {
        // 初回のみ：カメラの数字をそのまま最初の基準レートとして登録
        lastSavedRate = newRate;
        rateHistoryLog = [newRate];
        alert(`基準レート【 ${newRate} 】を設定しました。次戦から自動判定が始まります！`);
      }
      
      localStorage.setItem("lastSavedRate", lastSavedRate);
      saveToStorage(); 
      updateDisplay(); 
      checkAndRecordIfNeeded();
    };

    // マクロから叩かれるプロンプト処理
    window.triggerMacroInput = function() {
      const newRate = parseInt(prompt("新しいレートを入力してください"));
      if (isNaN(newRate) || newRate <= 0) return;
      window.processCapturedRate(newRate);
    };

    // 万が一のための手動バックアップ用（レートがカメラで読めなかった時用）
    window.addWinManual = function() { if(lastSavedRate !== null) window.processCapturedRate(lastSavedRate + 12); };
    window.addLossManual = function() { if(lastSavedRate !== null) window.processCapturedRate(lastSavedRate - 10); };

    window.undo = function() {
      if (undoStack.length === 0) return;
      const last = undoStack.pop();
      wins = last.wins;
      games = last.games;
      history = [...last.history];
      pastRates = [...last.pastRates];
      rateDetails = [...last.rateDetails];
      rateHistoryLog = [...last.rateHistoryLog];
      lastSavedRate = last.lastSavedRate;
      if (lastSavedRate === null) {
        localStorage.removeItem("lastSavedRate");
      } else {
        localStorage.setItem("lastSavedRate", lastSavedRate);
      }
      saveToStorage(); updateDisplay();
    };

    window.tryReset = function() {
      resetPressCount++;
      if (resetPressCount >= 3) {
        wins = 0; games = 0; history = []; pastRates = []; rateDetails = []; rateHistoryLog = [];
        lastSavedRate = null;
        resetPressCount = 0;
        localStorage.removeItem("lastSavedRate");
        saveToStorage(); updateDisplay();
        alert("リセットされました");
      } else {
        if (resetTimeout) clearTimeout(resetTimeout);
        resetTimeout = setTimeout(() => { resetPressCount = 0; }, 3000);
        alert(`リセットするにはもう${3 - resetPressCount}回押してください`);
      }
    };

    loadFromStorage();
    updateDisplay();
  </script>
</body>
</html>
